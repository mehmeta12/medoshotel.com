<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Buton Düzeni Önizleme</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:   #00b1c9;
    --secondary: #13508b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Kanit', sans-serif;
    background: url('img/medos-hotel-hero-poster.jpg') center/cover no-repeat fixed;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
  }

  .btn-group {
    position: fixed;
    bottom: 28px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    z-index: 100;
    width: 230px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    height: 48px;
    width: 100%;
    border-radius: 999px;
    font-family: 'Kanit', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    color: white;
    box-shadow: 0 4px 18px rgba(0,0,0,.3);
    transition: filter .2s, transform .15s;
  }
  .btn:hover { filter: brightness(1.12); transform: translateY(-2px); }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-a { background: var(--secondary); }   /* lacivert — üst ve alt */
  .btn-b { background: var(--primary); }     /* teal — orta */
</style>
</head>
<body>

<div class="btn-group">

  <!-- 1. Chatbot -->
  <button class="btn btn-a" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    Asistanınız
  </button>

  <!-- 2. Ara (orta — farklı renk) -->
  <a class="btn btn-b" href="tel:+902566450740">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.39 18a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
    0256 645 07 40
  </a>

  <!-- 3. Rezervasyon -->
  <a class="btn btn-a" href="booking.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Rezervasyon Yap
  </a>

</div>

</body>
</html>
