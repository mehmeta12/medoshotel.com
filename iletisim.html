<!DOCTYPE html>
<html lang="tr" data-title-i18n="page.contact.title">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.medoshotel.com/iletisim.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/additions.css">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"LocalBusiness","name":"Medos Hotel","telephone":"+902566450740","email":"info@medoshotel.com","address":{"@type":"PostalAddress","streetAddress":"Zeus Cumhuriyet Sk No: 5","addressLocality":"Güzelçamlı","addressRegion":"Kuşadası, Aydın","postalCode":"09430","addressCountry":"TR"},"openingHours":"Mo-Su 00:00-23:59"}</script>
</head>
<body>
  <!-- Header injected by layout.js -->

  <main>

    <!-- Hero -->
    <section class="page-hero" data-bg="img/medos-hotel-hero.webp">
      <div class="page-hero-content">
        <h1 data-i18n="page.contact.title">İletişim</h1>
        <p class="hero-subtitle" data-i18n="page.contact.hero_subtitle">Sorularınız için buradayız</p>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html" data-i18n="breadcrumb.home">Ana Sayfa</a>
          <span class="sep" aria-hidden="true">/</span>
          <span data-i18n="page.contact.title">İletişim</span>
        </nav>
      </div>
    </section>

    <!-- Contact Layout -->
    <section class="section">
      <div class="container">
        <div class="contact-layout">

          <!-- Left: Form -->
          <div class="contact-form-wrap">
            <h2 class="section-title contact-form-title" data-i18n="page.contact.form_title">Mesaj Gönderin</h2>

            <form id="contactForm" novalidate aria-label="İletişim formu">
              <div class="form-row">
                <div class="form-group">
                  <label for="name" data-i18n="page.contact.name">Ad Soyad</label>
                  <input type="text" id="name" name="name" autocomplete="name" required aria-required="true"
                         data-i18n-placeholder="page.contact.name">
                </div>
                <div class="form-group">
                  <label for="email" data-i18n="page.contact.email">E-posta Adresi</label>
                  <input type="email" id="email" name="email" autocomplete="email" required aria-required="true"
                         data-i18n-placeholder="page.contact.email">
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="phone" data-i18n="page.contact.phone">Telefon (İsteğe Bağlı)</label>
                  <input type="tel" id="phone" name="phone" autocomplete="tel"
                         data-i18n-placeholder="page.contact.phone">
                </div>
                <div class="form-group">
                  <label for="subject" data-i18n="page.contact.subject">Konu</label>
                  <input type="text" id="subject" name="subject" required aria-required="true"
                         data-i18n-placeholder="page.contact.subject">
                </div>
              </div>

              <div class="form-group">
                <label for="message" data-i18n="page.contact.message">Mesajınız</label>
                <textarea id="message" name="message" rows="5" required aria-required="true"
                          data-i18n-placeholder="page.contact.message"></textarea>
              </div>

              <button type="submit" class="btn btn-primary btn-block">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                <span data-i18n="btn.send">Gönder</span>
              </button>

              <div class="form-msg" id="formMsg" role="status" data-i18n="page.contact.form_success"></div>
            </form>
          </div>

          <!-- Right: Contact Info -->
          <div class="contact-cards">

            <div class="contact-card">
              <div class="contact-card-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              </div>
              <div>
                <h4 data-i18n="page.contact.address_title">Adres</h4>
                <p>Zeus Cumhuriyet Sk No: 5<br>Güzelçamlı Mh., 09430<br>Kuşadası, Aydın, Türkiye</p>
              </div>
            </div>

            <div class="contact-card">
              <div class="contact-card-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 7 7l.78-.78a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 17.5z"/></svg>
              </div>
              <div>
                <h4 data-i18n="page.contact.phone_title">Telefon</h4>
                <p><a href="tel:+902566450740">0256 645 07 40</a></p>
              </div>
            </div>

            <div class="contact-card">
              <div class="contact-card-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <div>
                <h4 data-i18n="page.contact.email_title">E-posta</h4>
                <p><a href="mailto:info@medoshotel.com">info@medoshotel.com</a></p>
              </div>
            </div>

            <div class="contact-card">
              <div class="contact-card-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div>
                <h4 data-i18n="page.contact.hours_title">Resepsiyon Saatleri</h4>
                <p data-i18n="page.contact.hours">24 Saat / 7 Gün</p>
              </div>
            </div>

            <!-- Map -->
            <a href="https://maps.google.com/maps?q=Güzelçamlı,+Kuşadası" target="_blank" rel="noopener noreferrer"
               class="map-link contact-map-link">
              <div class="map-placeholder contact-map-placeholder">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span data-i18n="btn.map">Haritada Görüntüle</span>
              </div>
            </a>

          </div>

        </div>
      </div>
    </section>

  </main>

  <script src="js/i18n.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <script>
    /* Contact form: client-side only (mailto fallback) */
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = e.target;
      var name    = form.name.value.trim();
      var email   = form.email.value.trim();
      var subject = form.subject.value.trim();
      var message = form.message.value.trim();
      if (!name || !email || !message) return;

      /* Compose mailto link as static-site fallback */
      var body = encodeURIComponent('Ad Soyad: ' + name + '\nE-posta: ' + email + '\n\n' + message);
      window.location.href = 'mailto:info@medoshotel.com?subject=' + encodeURIComponent(subject || 'Web Sitesi İletişim Formu') + '&body=' + body;

      var msg = document.getElementById('formMsg');
      msg.style.display = 'block';
      form.reset();
    });
  </script>
</body>
</html>
